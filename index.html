<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Móntate en la Honda y Gana</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #cc0000; color: #333; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
    .container { max-width: 500px; width: 100%; background: #fff; padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); box-sizing: border-box; position: relative; }
    
    h2 { text-align: center; margin-top: 10px; color: #111; font-size: 24px; font-weight: 800; text-transform: uppercase; letter-spacing: -0.5px; margin-bottom: 5px; }
    .instrucciones { font-size: 14px; color: #666; text-align: center; margin-bottom: 15px; line-height: 1.4; }
    
    #intro-foto-container { width: 100%; border-radius: 12px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 6px 15px rgba(0,0,0,0.3); border: 2px solid #cc0000; transition: all 0.8s ease; max-height: 85vh; opacity: 1; }
    #intro-foto-container.hidden { max-height: 0; margin-bottom: 0; opacity: 0; padding: 0; border: none; pointer-events: none; }
    #intro-foto-container img { width: 100%; height: auto; display: block; }

    /* Barra de Progreso */
    .progress-container { margin-bottom: 20px; background: #eee; border-radius: 12px; padding: 3px; position: relative; height: 22px; margin-top: 10px; }
    .progress-bar { height: 100%; background: #00c853; width: 0%; border-radius: 10px; transition: width 0.5s ease-in-out; position: relative; }
    
    /* Logo de la planta sin bordes */
    .planta-logo-icono { position: absolute; right: -25px; top: -14px; width: 50px; z-index: 10; }
    .planta-logo-icono img { width: 100%; height: auto; display: block; background: transparent; }

    .progress-text { text-align: center; font-size: 13px; font-weight: bold; margin-top: 5px; color: #111; }
    
    /* Cuadrícula corregida */
    .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; max-height: 230px; overflow-y: auto; padding: 8px; border: 1px solid #eef0f2; border-radius: 10px; background: #fafafa; margin-bottom: 20px; }
    .btn-ticket { position: relative; padding: 8px 0; border: 1px solid #dbe0e5; background: #fff; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 12px; text-align: center; }
    
    .btn-ticket.seleccionado { background: #00c853 !important; color: #fff !important; border-color: #00c853 !important; }
    .btn-ticket.vendido { background: #ffebee; color: #b71c1c; border-color: #ffcbd1; cursor: not-allowed; }
    .btn-ticket.vendido::after { content: "X"; position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 900; color: #b71c1c; }
    
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 700; color: #222; }
    input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
    
    .display-monto { background: #ffd700; font-weight: bold; color: #111; text-align: center; font-size: 18px; padding: 14px; border-radius: 8px; box-shadow: 0 4px 10px rgba(255, 215, 0, 0.3); }
    .btn-action { width: 100%; padding: 14px; background: #00c853; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
    .btn-action:disabled { background: #cbd5e1; cursor: not-allowed; }
    
    .btn-back-top { background: none; border: none; color: #666; font-size: 13px; text-decoration: underline; cursor: pointer; }
    .pm-box { background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 10px; padding: 15px; margin-bottom: 20px; }
    .pm-line { display: flex; justify-content: space-between; padding: 8px 0; }
    .pm-value { font-weight: bold; }
    .btn-copy { padding: 4px 8px; font-size: 11px; background: #e9ecef; border: 1px solid #ced4da; border-radius: 4px; cursor: pointer; }

    .accordion { border: 1px solid #dbe0e5; border-radius: 8px; margin-bottom: 20px; overflow: hidden; }
    .accordion-header { background: #f4f6f8; padding: 12px; font-size: 13px; font-weight: bold; cursor: pointer; color: #cc0000; display: flex; justify-content: space-between; }
    .accordion-content { padding: 12px; font-size: 13px; color: #555; display: none; background: #fff; }

    #msg { margin-top: 15px; text-align: center; font-weight: 600; padding: 12px; border-radius: 8px; display: none; }
    .success { background: #e8f5e9; color: #1b5e20; }
    .error { background: #ffebee; color: #b71c1c; }
    .page { display: none; }
    .page.active { display: block; }
  </style>
</head>
<body>

<div class="container">
  <div id="page-1" class="page active">
    <h2>🎟️ Móntate en la Honda y Gana</h2>
    <div id="intro-foto-container">
      <img src="https://lh3.googleusercontent.com/d/1mfd72SdumMWds2VIsZJ5twzJfHyk_CFd" alt="Hoy toca">
    </div>

    <div class="progress-container">
      <div id="mi-barra" class="progress-bar">
        <div class="planta-logo-icono">
            <img src="https://lh3.googleusercontent.com/d/1mD46Oa0hN7Oq1FySkTMbW-vdtmnvRQcB" alt="Logo">
        </div>
      </div>
    </div>
    <div id="progreso-texto" class="progress-text">Cargando...</div>

    <div class="accordion">
      <div class="accordion-header" onclick="alternarAcordeon()">
        <span>⚠️ Ver Condiciones</span><span>▼</span>
      </div>
      <div class="accordion-content" id="acc-content">Condiciones del sorteo aquí...</div>
    </div>

    <div class="grid" id="grid-tickets"></div>

    <div class="form-group">
      <label>Números Seleccionados</label>
      <input type="text" id="ticket-display" readonly>
    </div>

    <div class="display-monto" id="monto-calculado">Total Tickets: 0<br>Total: 0,00 Bs.</div>

    <div class="form-group" style="margin-top:15px;">
      <label>Nombre</label>
      <input type="text" id="nombre">
      <label>Teléfono</label>
      <input type="tel" id="telefono">
    </div>

    <button type="button" class="btn-action" id="btn-continuar" disabled onclick="irAPaso2()">Ultimo paso para jugar 👉</button>
  </div>

  <div id="page-2" class="page">
    <button class="btn-back-top" onclick="irAPaso1()">◀ Atrás</button>
    <div class="pm-box">
      <div class="pm-line"><span>Banco:</span><span class="pm-value">Provincial</span></div>
      <div class="pm-line"><span>Teléfono:</span><span class="pm-value">04142298507</span></div>
      <div class="pm-line"><span>Cédula:</span><span class="pm-value">23889925</span></div>
    </div>
    <div class="display-monto" id="monto-confirmar">0,00 Bs.</div>
    <input type="file" id="capture-file" accept="image/*" required>
    <button type="submit" class="btn-action btn-ganar" id="btn-enviar" onclick="prepararEnvio()">Voy a Ganar 🚀</button>
  </div>
</div>

<script>
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwBtqptSC6CvawuLauQ15a7qdavhp86fOjePcO970vF8gMnU3nypkoWV0Q8VcdoFaBh/exec"; 
  let ticketsSeleccionados = [];
  const PRECIO_TICKET_BS = 2400;

  window.onload = () => {
    setTimeout(() => document.getElementById('intro-foto-container').classList.add('hidden'), 6000);
    fetch(WEB_APP_URL + "?run=obtenerTicketsYDatos").then(r=>r.json()).then(inicializarDatos);
  };

  function inicializarDatos(resultado) {
    document.getElementById('mi-barra').style.width = resultado.porcentajeVendido + "%";
    document.getElementById('progreso-texto').innerText = resultado.porcentajeVendido + "% vendidos";
    renderizarTickets(resultado.tickets);
  }

  function renderizarTickets(tickets) {
    const grid = document.getElementById('grid-tickets');
    grid.innerHTML = '';
    tickets.forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'btn-ticket' + (t.estado === 'Vendido' ? ' vendido' : '');
      btn.innerText = t.numero;
      if(t.estado !== 'Vendido') btn.onclick = () => alternarTicket(btn, t.numero);
      grid.appendChild(btn);
    });
  }

  function alternarTicket(elemento, numero) {
    const index = ticketsSeleccionados.indexOf(numero);
    if (index === -1) { ticketsSeleccionados.push(numero); elemento.classList.add('seleccionado'); }
    else { ticketsSeleccionados.splice(index, 1); elemento.classList.remove('seleccionado'); }
    
    document.getElementById('ticket-display').value = ticketsSeleccionados.join(', ');
    const total = ticketsSeleccionados.length * PRECIO_TICKET_BS;
    document.getElementById('monto-calculado').innerHTML = `Total Tickets: ${ticketsSeleccionados.length}<br>Total: ${total.toLocaleString()} Bs.`;
    document.getElementById('btn-continuar').disabled = ticketsSeleccionados.length === 0;
  }
  
  function irAPaso2() {
    const total = ticketsSeleccionados.length * PRECIO_TICKET_BS;
    document.getElementById('monto-confirmar').innerText = total.toLocaleString() + " Bs.";
    document.getElementById('page-1').classList.remove('active');
    document.getElementById('page-2').classList.add('active');
  }
  function irAPaso1() {
    document.getElementById('page-2').classList.remove('active');
    document.getElementById('page-1').classList.add('active');
  }
</script>
</body>
</html>
